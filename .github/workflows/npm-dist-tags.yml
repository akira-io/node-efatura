name: npm dist-tags

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published package version to promote"
        required: true
        type: string
      set_latest:
        description: "Move latest to this version"
        required: true
        default: true
        type: boolean
      set_beta:
        description: "Move beta to this version"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync npm dist-tags
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION="${{ inputs.version }}"
          npm view "$NAME@$VERSION" version
          if [[ "${{ inputs.set_beta }}" == "true" ]]; then
            npx -y npm@11 dist-tag add "$NAME@$VERSION" beta
          fi
          if [[ "${{ inputs.set_latest }}" == "true" ]]; then
            npx -y npm@11 dist-tag add "$NAME@$VERSION" latest
          fi
