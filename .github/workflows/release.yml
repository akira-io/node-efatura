name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: git-cliff

      - name: Generate CHANGELOG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Ensure CHANGELOG contains tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%F)"
          if ! grep -q "^## \\[$VERSION\\]" CHANGELOG.md; then
            awk -v version="$VERSION" -v date="$DATE" '
              BEGIN {
                inserted = 0
                entry = "## [" version "] - " date "\n\n### Changed\n\n- Release v" version ".\n"
              }
              /^## \[/ && inserted == 0 {
                print entry
                inserted = 1
              }
              { print }
              END {
                if (inserted == 0) {
                  print ""
                  print entry
                }
              }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

      - name: Bump package.json version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit CHANGELOG and package.json
        run: |
          DEFAULT_BRANCH="$(git remote show origin | sed -n 's/.*HEAD branch: //p')"
          git config user.name "$(git show -s --format='%an' HEAD)"
          git config user.email "$(git show -s --format='%ae' HEAD)"
          git add CHANGELOG.md package.json
          git diff --cached --quiet || git commit -m "chore(changelog): ${{ github.ref_name }}"
          git push origin "HEAD:${DEFAULT_BRANCH}" || true

      - name: Extract release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'body<<EOF'
            git-cliff --config cliff.toml --latest --strip all
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${GITHUB_REF_NAME#*-}" != "${GITHUB_REF_NAME}" ]; then
            RELEASE_FLAG="--prerelease"
          else
            RELEASE_FLAG="--latest"
          fi
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            "${RELEASE_FLAG}"

      - name: Send GitHub Release to Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: SethCohen/github-releases-to-discord@24d166886aee4646d448c8a389ff9e1ebcab3682 # v1.20.0
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK }}
          release_name: ${{ github.ref_name }}
          release_body: ${{ steps.notes.outputs.body }}
          release_html_url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          color: "8150256"
          username: "Efatura Releases"
          footer_title: "@akira-io/efatura"
          footer_timestamp: true
