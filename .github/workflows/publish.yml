name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install XML tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Resolve package identity
        id: package
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: version_check
        run: |
          NAME="${{ steps.package.outputs.name }}"
          VER="${{ steps.package.outputs.version }}"
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Already published: $NAME@$VER"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            npx -y npm@11 publish --access public --provenance --tag beta
          else
            npx -y npm@11 publish --access public --provenance
          fi

      - name: Sync prerelease dist-tags
        if: contains(github.ref_name, '-')
        run: |
          PACKAGE="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          npx -y npm@11 dist-tag add "$PACKAGE" beta
          npx -y npm@11 dist-tag add "$PACKAGE" latest
